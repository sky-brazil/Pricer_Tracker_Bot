# Price Tracker - production-ready baseline config.
# Use this file as your default local setup.

check_interval_minutes: 60
currency: "USD"

data_source:
  type: "csv"
  path: "urls.example.csv"

notifications:
  telegram:
    enabled: true
    bot_token: "USE_ENV"   # loaded from TELEGRAM_BOT_TOKEN
    chat_id: "USE_ENV"     # loaded from TELEGRAM_CHAT_ID

  # Optional extension point for client-specific email channels.
  # Not implemented in this baseline package.
  email:
    enabled: false
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    use_tls: true
    username: "USE_ENV"
    password: "USE_ENV"
    from_email: "USE_ENV"
    to_emails:
      - "client@example.com"
